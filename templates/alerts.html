{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Security Alerts</h2>

<div class="card shadow">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Time</th>
                    <th>Message</th>
                    <th>Risk Level</th>
                </tr>
            </thead>
            <tbody>
                {% for alert in alerts %}
                <tr>
                    <td>{{ alert.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                    <td>{{ alert.message }}</td>
                    <td>
                        <span class="badge bg-{{ 'danger' if alert.risk == 'high' else 'warning' if alert.risk == 'medium' else 'info' }}">
                            {{ alert.risk | upper }}
                        </span>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="text-center text-muted py-4">No alerts found. Great job!</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
